<!DOCTYPE html>
<html>
<head>
<title>Akatsuki Members</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
height:100vh;

/* Akatsuki Background */
background-image:url("akatsuki-bg.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

/* Home button */
.home{
position:absolute;
top:20px;
left:20px;
background:red;
color:white;
padding:10px 20px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.home:hover{
background:darkred;
}

h1{
color:red;
margin-top:40px;
}

/* Container */
.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
margin-top:60px;
}

/* Box */
.box{
width:200px;
height:200px;
background:rgba(0,0,0,0.6);
border-radius:10px;
padding:10px;
transition:0.3s;
}

.box:hover{
transform:scale(1.08);
}

/* Image */
.box img{
width:100%;
height:180px;
border-radius:10px;
}

a{
text-decoration:none;
}

</style>
</head>

<body>

<!-- Home Button -->
<a href="naruto.html" class="home">Home</a>

<h1>Akatsuki Members</h1>

<audio autoplay loop>
<source src="akatsuki.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="box">
<a href="pain.html">
<img src="pain.jpg">
</a>
</div>

<div class="box">
<a href="itachi.html">
<img src="itachi.jpg">
</a>
</div>

<div class="box">
<a href="kisame.html">
<img src="kisame.jpg">
</a>
</div>

<div class="box">
<a href="deidara.html">
<img src="deidara.jpg">
</a>
</div>

<div class="box">
<a href="sasori.html">
<img src="sasori.jpg">
</a>
</div>

<div class="box">
<a href="obito.html">
<img src="obito.jpg">
</a>
</div>

</div>

</body>
</html>
