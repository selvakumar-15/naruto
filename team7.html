<!DOCTYPE html>
<html>
<head>
<title>Team 7</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("1.jpg");
background-size:cover;
color:white;
}

h1{
text-align:center;
color:orange;
}

.container{
display:flex;
padding:20px;
}

.menu{
width:200px;
}

.box{
width:150px;
height:120px;
border:3px solid orange;
margin-bottom:20px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-weight:bold;
border-radius:10px;
background:rgba(0,0,0,0.6);
transition:0.3s;
}

.box:hover{
background:orange;
color:black;
transform:scale(1.05);
}

.details{
flex:1;
margin-left:40px;
background:rgba(0,0,0,0.8);
border-radius:20px;
padding:30px;
height:520px;
overflow-y:auto;
}

.details img{
width:250px;
margin-top:15px;
border-radius:10px;
}

video{
margin-top:15px;
border-radius:10px;
}

a{
color:cyan;
font-size:18px;
}

.backbtn{
display:block;
width:220px;
margin:30px auto;
padding:12px;
background:orange;
color:black;
text-align:center;
font-weight:bold;
border-radius:10px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="menu">
