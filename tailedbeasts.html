background-size:cover;
background-position:center;

background-attachment:fixed;

/* Home button */
.home{
position:absolute;
top:20px;
left:20px;
background:orange;
color:black;
padding:10px 20px;
border-radius:6px;

font-weight:bold;
transition:0.3s;
}

}

}

/* Container */
.container{
display:flex;
flex-wrap:wrap;
justify-content:center;

}

/* Box */
.box{
width:180px;
height:180px;
background:rgba(0,0,0,0.6);
border-radius:10px;
padding:10px;
transition:0.3s;
}

.box:hover{
transform:scale(1.08);
}

/* Image */
.box img{
width:100%;
height:160px;
border-radius:10px;
}

a{
text-decoration:none;
}

</style>
