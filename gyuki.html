<!DOCTYPE html>
<html>
<head>
<title>Gyuki - Eight Tails</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background-image:url("18.jpeg");
background-size:cover;
background-position:center;
}

.container{
width:85%;
margin:auto;
margin-top:70px;
background:rgba(0,0,0,0.8);
padding:40px;
border-radius:20px;
}

h1{
color:orange;
}

.images{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.images img{
width:200px;
height:200px;
border-radius:10px;
object-fit:cover;
cursor:pointer;
transition:0.3s;
}

.images img:hover{
transform:scale(1.05);
}

.centergif{
width:120px;
height:120px;
cursor:default;
}

.details{
margin-top:20px;
font-size:18px;
line-height:1.6;
}

.backbtn{
display:inline-block;
margin-top:30px;
padding:12px 25px;
background:orange;
color:black;
font-weight:bold;
border-radius:10px;
text-decoration:none;
}

</style>
</head>

<body>

<h1>Gyuki (Eight Tails)</h1>

<div class="container">

<div class="images">

<img src="gyuki1.jpg" onclick="showBeast()">

<img src="h.gif" class="centergif">

<img src="killerbee.jpg" onclick="showJin()">

</div>

<div class="details" id="details">

Click Gyuki or Killer Bee image to see details.

</div>

<a href="tailedbeasts.html" class="backbtn">⬅ Back to Tailed Beasts</a>

</div>

<script>

function showBeast(){

document.getElementById("details").innerHTML = `
<h2>Gyuki</h2>
<p>Gyuki is the Eight-Tailed Beast.</p>
<p>It looks like a giant ox combined with an octopus.</p>
<p>Gyuki has enormous strength and powerful tentacle attacks.</p>
<p>It has a strong bond with its jinchūriki Killer Bee.</p>
`;

}

function showJin(){

document.getElementById("details").innerHTML = `
<h2>Killer Bee</h2>
<p>Killer Bee is the jinchūriki of the Eight-Tailed Beast Gyuki.</p>
<p>He is a ninja from the Hidden Cloud Village.</p>
<p>Killer Bee is known for his rap style and incredible sword skills.</p>
<p>He has a strong friendship with Gyuki and can control its power perfectly.</p>
`;

}

</script>

</body>
</html>
