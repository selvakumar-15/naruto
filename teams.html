<!DOCTYPE html>
<html>
<head>
<title>Naruto Teams</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
height:100vh;

background-image:url("naruto2.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

/* Home button */
.home{
position:absolute;
top:20px;
left:20px;
background:orange;
color:black;
padding:10px 20px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.home:hover{
background:darkorange;
}

h1{
color:orange;
margin-top:40px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
margin-top:60px;
}

.box{
width:220px;
height:200px;
background:rgba(0,0,0,0.6);
border-radius:10px;
padding:10px;
transition:0.3s;
}

.box:hover{
transform:scale(1.05);
}

.box img{
width:100%;
height:180px;
border-radius:10px;
}

a{
text-decoration:none;
}

</style>
</head>

<body>

<!-- Home Button -->
<a href="naruto.html" class="home">Home</a>

<h1>Naruto Teams</h1>

<div class="container">

<a href="team7.html">
<div class="box">
<img src="team7.jpg">
</div>
</a>

<a href="team8.html">
<div class="box">
<img src="team8.jpg">
</div>
</a>

<a href="team10.html">
<div class="box">
<img src="team10.jpg">
</div>
</a>

<a href="teamguy.html">
<div class="box">
<img src="teamguy.jpg">
</div>
</a>

</div>

</body>
</html>
